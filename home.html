<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Imóvel</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="container">
    <form id="imovelForm" class="imobiliaria-form">
        <h2>Cadastro de Imóvel</h2>

        <div class="section location-group">
            <div class="input-box full">
                <label>Endereço</label>
                <input type="text" id="endereco" name="endereco" placeholder="Ex: Rua das Flores, 123" required>
            </div>
            <div class="input-box">
                <label>Bairro</label>
                <input type="text" id="bairro" name="bairro" placeholder="Ex: Jardins" required>
            </div>
            <div class="input-box">
                <label>Cidade</label>
                <input type="text" id="cidade" name="cidade" placeholder="Ex: São Paulo" required>
            </div>
            <div class="input-box small">
                <label>Local UF</label>
                <select id="uf" name="uf" required>
                    <option value="" disabled selected>UF</option>
                    <option value="AC">AC</option>
                    <option value="AL">AL</option>
                    <option value="AP">AP</option>
                    <option value="AM">AM</option>
                    <option value="BA">BA</option>
                    <option value="CE">CE</option>
                    <option value="DF">DF</option>
                    <option value="ES">ES</option>
                    <option value="GO">GO</option>
                    <option value="MA">MA</option>
                    <option value="MT">MT</option>
                    <option value="MS">MS</option>
                    <option value="MG">MG</option>
                    <option value="PA">PA</option>
                    <option value="PB">PB</option>
                    <option value="PR">PR</option>
                    <option value="PE">PE</option>
                    <option value="PI">PI</option>
                    <option value="RJ">RJ</option>
                    <option value="RN">RN</option>
                    <option value="RS">RS</option>
                    <option value="RO">RO</option>
                    <option value="RR">RR</option>
                    <option value="SC">SC</option>
                    <option value="SP">SP</option>
                    <option value="SE">SE</option>
                    <option value="TO">TO</option>
                </select>
            </div>
        </div>

        <div class="section values-group">
            <div class="input-box">
                <label>Tipo de negócio</label>
                <select id="aluguelVenda" name="aluguelVenda" required>
                    <option value="" disabled selected>Selecione</option>
                    <option value="true">Aluguel</option>
                    <option value="false">Venda</option>
                </select>
            </div>
            <div class="input-box">
                <label>Valor de Aluguel</label>
                <input type="text" id="aluguel" name="aluguel" placeholder="R$ 0,00">
            </div>
            <div class="input-box">
                <label>Valor de Cond.</label>
                <input type="text" id="condo" name="condo" placeholder="R$ 0,00">
            </div>
            <div class="input-box">
                <label>Valor de IPTU</label>
                <input type="text" id="iptu" name="iptu" placeholder="R$ 0,00">
            </div>
        </div>

        <div class="section details-group">
            <div class="row">
                <div class="input-box col">
                    <label>Quartos</label>
                    <input type="number" id="quartos" name="quartos" min="0" required>
                </div>
                <div class="input-box col">
                    <label>Banheiros</label>
                    <input type="number" id="banheiros" name="banheiros" min="0" required>
                </div>
                <div class="input-box col">
                    <label>Vagas</label>
                    <input type="number" id="vagas" name="vagas" min="0" required>
                </div>
                <div class="input-box col">
                    <label>Metros²</label>
                    <input type="number" id="metragem" name="metragem" min="0" step="0.1" placeholder="Ex: 75.5" required>
                </div>
            </div>
            
            <div class="input-box full">
                <label>Descrição (máx. 5000 caracteres)</label>
                <textarea id="descricao" name="descricao" maxlength="5000" placeholder="Descreva os diferenciais do imóvel..."></textarea>
                <span id="charCounter">5000 caracteres restantes</span>
            </div>
        </div>

        <div class="section photos-group">
            <label>Fotos do Imóvel (Até 50)</label>
            <input type="file" id="fotos" name="fotos[]" multiple accept="image/*" style="display: none;">
            
            <label id="file-input-label" for="fotos">
                Clique aqui para selecionar as fotos
            </label>
            
            <span id="photoCounter">0 fotos selecionadas</span>
            <div id="photo-preview" class="photo-preview"></div>
        </div>

        <button type="submit" class="btn-submit">Cadastrar Imóvel</button>
    </form>
</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="base/config.js"></script>
    <script src="js/script.js"></script>
    <script src="js/home.js"></script>
</body>
</html>
